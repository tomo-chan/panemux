version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - dupl
    - errcheck
    - errname
    - goconst
    - gosec
    - govet
    - ineffassign
    - funlen
    - lll
    - makezero
    - misspell
    - nilerr
    - perfsprint
    - revive
    - sloglint
    - staticcheck
    - unused
    - whitespace
    - wrapcheck
  settings:
    dupl:
      threshold: 100
    govet:
      enable:
        - fieldalignment
        - shadow
    misspell:
      locale: US
    revive:
      enable-default-rules: true
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: unused-parameter
          disabled: true
    staticcheck:
      checks: ["all"]
    whitespace:
      multi-if: true
  exclusions:
    presets:
      # Keep standard-library edge cases from drowning out project-specific
      # errcheck/wrapcheck findings.
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Session package manages OS processes and SSH connections; Close/Wait/Kill
      # errors in teardown paths are not actionable.
      - path: internal/session/
        linters:
          - errcheck
          - wrapcheck
      # Test cleanup (defer conn.Close(), SetReadDeadline, ReadMessage) does not
      # require error handling — test failures surface through assertions.
      - path: _test\.go
        linters:
          - errcheck
          - goconst

formatters:
  enable:
    - gofmt
