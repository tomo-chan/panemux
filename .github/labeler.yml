frontend:
  - changed-files:
    - any-glob-to-any-file:
      - 'frontend/**'

backend:
  - changed-files:
    - any-glob-to-any-file:
      - 'internal/**'
      - 'main.go'
      - 'go.mod'
      - 'go.sum'

docs:
  - changed-files:
    - any-glob-to-any-file:
      - 'docs/**'
      - '*.md'

ci:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/**'
      - 'Makefile'
      - '.goreleaser.yaml'
