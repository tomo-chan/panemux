name: ci

on:
  push:
    branches:
      - main
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'frontend/**'
      - 'Makefile'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'frontend/**'
      - 'Makefile'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write   # required by dorny/test-reporter to create Check runs

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: make install-deps-ci

      - name: Build frontend
        run: make build-frontend

      - name: Lint
        run: make lint

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Create test-results directory
        run: mkdir -p test-results

      - name: Test (Go)
        run: |
          set -o pipefail
          go test -v ./... -race 2>&1 | go-junit-report -set-exit-code > test-results/go-junit.xml

      - name: Test (Frontend)
        run: cd frontend && npm run test:ci

      - name: Report Go test results
        uses: dorny/test-reporter@3d76b34a4535afbd0600d347b09a6ee5deb3ed7f
        if: always()
        with:
          name: Go Tests
          path: test-results/go-junit.xml
          reporter: jest-junit
          fail-on-error: false

      - name: Report Frontend test results
        uses: dorny/test-reporter@3d76b34a4535afbd0600d347b09a6ee5deb3ed7f
        if: always()
        with:
          name: Frontend Tests
          path: test-results/vitest.xml
          reporter: jest-junit
          fail-on-error: false

      - name: Coverage (Go)
        run: make coverage-go

      - name: Coverage (Frontend)
        run: make coverage-frontend
